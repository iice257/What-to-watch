<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>ScrollFlix</title>
    <meta name="description" content="ScrollFlix is an interactive movie discovery gallery with visual film browsing, filters, and a cinematic movie index." />
    <meta name="keywords" content="ScrollFlix, movies, films, movie discovery, interactive, WebGL, cinema, recommendations" />
    <meta name="author" content="ICE" />
    <link rel="canonical" href="https://what-to-watch.example/" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ScrollFlix - Interactive Movie Discovery" />
    <meta property="og:description" content="ScrollFlix is an interactive movie discovery gallery with visual film browsing, filters, and a cinematic movie index." />
    <meta property="og:url" content="https://what-to-watch.example/" />
    <meta property="og:site_name" content="ScrollFlix" />
    <meta property="og:image" content="https://what-to-watch.example/og.jpg" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="800" />
    <meta property="og:image:alt" content="Interactive movie discovery visualization interface" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ScrollFlix - Interactive Movie Discovery" />
    <meta name="twitter:description" content="ScrollFlix is an interactive movie discovery gallery with visual film browsing, filters, and a cinematic movie index." />
    <meta name="twitter:image" content="https://what-to-watch.example/og.jpg" />
    <meta name="twitter:image:alt" content="Interactive movie discovery visualization interface" />
    
    <!-- Additional Meta -->
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScrollFlix" />
    
    <!-- Robots -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  </head>
  <body class="bg-background">
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
